<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>궁극의 마법부여소 - 무기 강화</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        
        :root {
            --sword-glow: rgba(255, 255, 255, 0.5);
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #050508;
            color: #e2e8f0;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- 애니메이션 정의 --- */
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin 40s linear infinite; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-8px); }
            20%, 40%, 60%, 80% { transform: translateX(8px); }
        }
        .animate-shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }

        @keyframes burst-fade { 
            0% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0; transform: scale(1.5); }
        }
        .effect-burst { animation: burst-fade 0.8s ease-out forwards; }

        @keyframes float-up {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(-40px); }
        }
        .animate-float-up { animation: float-up 0.7s ease-out forwards; }

        .log-entry { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1; transform: translateX(0); } }

        /* 섬광 효과 */
        .flash-overlay {
            position: fixed; inset: 0; pointer-events: none; z-index: 100; opacity: 0;
        }
        .flash-success { animation: flashS 0.6s ease-out; }
        @keyframes flashS { 0% { opacity: 0.8; background: white; } 100% { opacity: 0; background: transparent; } }
        .flash-fail { animation: flashF 0.6s ease-out; }
        @keyframes flashF { 0% { opacity: 0.6; background: #991b1b; } 100% { opacity: 0; background: transparent; } }

        .game-viewport { height: 100dvh; display: flex; flex-direction: column; position: relative; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        #sword-image {
            filter: drop-shadow(0 0 20px var(--sword-glow));
            transition: filter 0.3s ease;
        }
    </style>
</head>
<body class="bg-black">

    <div id="flash-effect" class="flash-overlay"></div>

    <div class="game-viewport">
        <!-- [1] 로딩 화면 -->
        <div id="screen-loading" class="fixed inset-0 z-[110] bg-[#050508] flex flex-col items-center justify-center transition-opacity duration-1000">
            <div class="relative w-24 h-24 mb-8">
                <div class="absolute inset-0 border-4 border-red-900/30 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-t-red-600 rounded-full animate-spin"></div>
            </div>
            <h1 class="text-2xl font-black tracking-[0.5em] text-red-600 animate-pulse">LOADING...</h1>
            <p class="mt-4 text-gray-500 font-mono text-sm">Initializing Magic Engine</p>
        </div>

        <!-- [2] 메뉴 화면 -->
        <div id="screen-menu" class="hidden fixed inset-0 z-50 bg-[#050508] flex flex-col items-center justify-center p-6 text-center overflow-hidden">
            <div class="absolute inset-0 opacity-10">
                <svg class="w-full h-full animate-spin-slow" viewBox="0 0 500 500">
                    <circle cx="250" cy="250" r="220" stroke="white" stroke-width="1" fill="none" stroke-dasharray="10 20" />
                    <path d="M 250 10 L 490 250 L 250 490 L 10 250 Z" stroke="white" fill="none" />
                </svg>
            </div>
            <div class="z-10">
                <h1 class="text-7xl md:text-9xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-b from-gray-100 to-gray-700 tracking-tighter">무기 강화</h1>
                <p class="text-red-600 font-bold mb-20 text-xl tracking-[0.3em]">THE LEGENDARY BLACKSMITH</p>
                <div class="flex flex-col gap-5 w-80 mx-auto">
                    <button onclick="changeScreen('playing')" class="group relative py-6 bg-red-900 hover:bg-red-800 transition-all active:scale-95 shadow-[0_0_30px_rgba(153,27,27,0.4)]">
                        <span class="relative z-10 text-white font-black text-3xl tracking-widest">대장간 입장</span>
                    </button>
                    <button onclick="alert('image 폴더의 기본검.png와 화염검 _ 1~10.png를 준비하세요.')" class="py-4 bg-[#12121a] hover:bg-[#1a1a24] text-gray-400 font-bold text-lg border border-gray-800 transition-all">가이드</button>
                </div>
            </div>
        </div>

        <!-- [3] 게임 화면 -->
        <div id="screen-playing" class="hidden flex-1 flex flex-col relative overflow-hidden bg-gradient-to-b from-[#0a0a0f] to-black">
            
            <header class="flex justify-between items-center px-8 py-6 bg-[#0a0a0f]/80 backdrop-blur-md border-b border-gray-800 shrink-0 z-30">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-yellow-600/20 rounded-full flex items-center justify-center border border-yellow-600/50">
                        <span class="text-yellow-500 font-bold">⛃</span>
                    </div>
                    <span id="gold-display" class="font-mono text-2xl font-black text-gray-100 tracking-tighter">10,000 G</span>
                </div>
                <button onclick="location.reload()" class="px-6 py-2 bg-gray-900 hover:bg-red-900 transition-colors text-xs font-bold uppercase tracking-widest text-gray-400 hover:text-white border border-gray-800">초기화</button>
            </header>

            <main id="game-area" class="flex-1 relative flex flex-col items-center justify-center overflow-hidden">
                <!-- 배경 마법진 SVG -->
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-20">
                    <svg class="w-[150%] max-w-[900px] animate-spin-slow" viewBox="0 0 500 500">
                        <circle cx="250" cy="250" r="200" stroke="#ef4444" stroke-width="2" fill="none" stroke-dasharray="10 10" />
                        <circle cx="250" cy="250" r="170" stroke="#ef4444" stroke-width="1" fill="none" opacity="0.5" />
                        <path d="M 250 20 L 300 200 L 480 250 L 300 300 L 250 480 L 200 300 L 20 250 L 200 200 Z" stroke="#ef4444" fill="none" />
                    </svg>
                </div>

                <!-- 이펙트 레이어 -->
                <div id="effect-container" class="absolute inset-0 z-40 pointer-events-none flex items-center justify-center"></div>

                <div class="text-center mb-10 z-20">
                    <p class="text-gray-500 font-mono text-sm tracking-[0.5em] mb-2">CURRENT WEAPON</p>
                    <h2 class="text-5xl md:text-8xl font-black tracking-tighter drop-shadow-[0_10px_10px_rgba(0,0,0,1)]">
                        <span id="level-display" class="text-red-600">+0</span> <span id="name-display">기본검</span>
                    </h2>
                </div>

                <div id="sword-parent" class="relative w-full max-w-lg aspect-square flex items-center justify-center transition-all duration-700 z-10">
                    <img id="sword-image" src="" alt="무기" class="max-w-[80%] max-h-[80%] object-contain">
                </div>
            </main>

            <!-- 컨트롤 패널 -->
            <footer class="shrink-0 bg-[#0a0a0f] border-t border-gray-800 z-30 shadow-[0_-20px_50px_rgba(0,0,0,0.8)]">
                <div class="flex flex-col md:flex-row">
                    <div class="flex-1 p-6 border-b md:border-b-0 md:border-r border-gray-800 flex gap-4">
                        <div class="flex-1 bg-black/50 p-4 rounded border border-gray-800 text-center">
                            <span class="text-[10px] text-gray-500 block uppercase tracking-widest mb-1">성공 확률</span>
                            <span id="prob-display" class="text-green-400 font-black text-2xl font-mono">100%</span>
                        </div>
                        <div class="flex-1 bg-black/50 p-4 rounded border border-gray-800 text-center">
                            <span class="text-[10px] text-gray-500 block uppercase tracking-widest mb-1">강화 비용</span>
                            <span id="cost-display" class="text-yellow-500 font-black text-2xl font-mono">100 G</span>
                        </div>
                    </div>
                    <div class="flex-1 p-6 flex gap-4 bg-[#0d0d14]">
                        <button id="btn-enhance" class="flex-[3] py-6 bg-gradient-to-r from-red-950 to-red-800 hover:from-red-800 hover:to-red-700 text-white font-black text-3xl tracking-widest transition-all active:scale-95 disabled:opacity-30 shadow-lg border border-red-700/30">마법부여</button>
                        <button id="btn-sell" class="flex-1 py-6 bg-[#1a1a24] hover:bg-[#252533] text-gray-300 font-bold text-sm transition-all border border-gray-700">판매 <span id="sell-price-display" class="block text-yellow-600 font-mono text-xs">50 G</span></button>
                    </div>
                </div>
                <div id="log-box" class="h-32 bg-black/80 p-5 overflow-y-auto font-mono text-xs no-scrollbar border-t border-gray-900/50"></div>
            </footer>
        </div>

        <!-- 지원금 모달 -->
        <div id="modal-fairy" class="hidden fixed inset-0 bg-black/95 z-[200] flex items-center justify-center p-4 backdrop-blur-xl">
            <div class="bg-[#12121a] border border-yellow-700/30 p-10 text-center max-w-sm shadow-[0_0_100px_rgba(234,179,8,0.1)]">
                <div class="text-8xl mb-6">🧚‍♀️</div>
                <h3 class="text-2xl font-black mb-4 text-gray-100 tracking-widest">구호 요정의 은총</h3>
                <p class="text-gray-500 mb-10 text-sm leading-relaxed">"모든 재산을 잃으셨군요... 다시 일어설 수 있도록 마력을 나누어 드릴게요."</p>
                <div class="bg-black p-6 rounded-sm mb-10 border border-yellow-700/20">
                    <span class="text-yellow-500 font-black text-3xl">+ 5,000 G</span>
                </div>
                <button onclick="receiveFairy()" class="w-full py-5 bg-yellow-600/20 hover:bg-yellow-600/30 border border-yellow-600/50 text-yellow-500 font-black text-xl tracking-widest transition-all active:scale-95">은총 수락</button>
            </div>
        </div>
    </div>

    <script>
        // --- [1] 게임 데이터 세팅 (풀 레벨 0~20) ---
        const LEVEL_DATA = [
            { level: 0, cost: 100, prob: 100, sell: 50, color: '#ffffff' },
            { level: 1, cost: 500, prob: 98, sell: 300, color: '#fef3c7' },
            { level: 2, cost: 1000, prob: 90, sell: 1200, color: '#fde68a' },
            { level: 3, cost: 1500, prob: 85, sell: 2500, color: '#fcd34d' },
            { level: 4, cost: 2000, prob: 80, sell: 5500, color: '#fbbf24' },
            { level: 5, cost: 3000, prob: 75, sell: 15000, color: '#f59e0b' },
            { level: 6, cost: 4000, prob: 70, sell: 28000, color: '#d97706' },
            { level: 7, cost: 5500, prob: 65, sell: 45000, color: '#b45309' },
            { level: 8, cost: 7000, prob: 60, sell: 75000, color: '#92400e' },
            { level: 9, cost: 9000, prob: 55, sell: 120000, color: '#78350f' },
            { level: 10, cost: 12000, prob: 50, sell: 200000, color: '#ef4444' },
            { level: 11, cost: 15000, prob: 45, sell: 350000, color: '#dc2626' },
            { level: 12, cost: 20000, prob: 40, sell: 600000, color: '#b91c1c' },
            { level: 13, cost: 26000, prob: 35, sell: 1000000, color: '#991b1b' },
            { level: 14, cost: 35000, prob: 30, sell: 1800000, color: '#7f1d1d' },
            { level: 15, cost: 45000, prob: 25, sell: 3000000, color: '#450a0a' },
            { level: 16, cost: 60000, prob: 20, sell: 5500000, color: '#f43f5e' },
            { level: 17, cost: 80000, prob: 15, sell: 10000000, color: '#e11d48' },
            { level: 18, cost: 110000, prob: 10, sell: 18000000, color: '#be123c' },
            { level: 19, cost: 150000, prob: 5, sell: 35000000, color: '#9f1239' },
            { level: 20, cost: 0, prob: 0, sell: 80000000, color: '#ffffff' }
        ];

        // --- [2] 사운드 엔진 (Web Audio API) ---
        const Sound = {
            ctx: null,
            init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            play(type) {
                this.init();
                const g = this.ctx.createGain();
                g.connect(this.ctx.destination);
                g.gain.value = 0.1;
                const o = this.ctx.createOscillator();
                o.connect(g);
                const now = this.ctx.currentTime;

                if(type === 'hit') {
                    o.type = 'square';
                    o.frequency.setValueAtTime(200, now);
                    o.frequency.exponentialRampToValueAtTime(40, now + 0.15);
                    o.start(); o.stop(now + 0.15);
                } else if(type === 'success') {
                    o.type = 'sine';
                    o.frequency.setValueAtTime(500, now);
                    o.frequency.exponentialRampToValueAtTime(1200, now + 0.4);
                    g.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    o.start(); o.stop(now + 0.4);
                } else if(type === 'fail') {
                    o.type = 'sawtooth';
                    o.frequency.setValueAtTime(150, now);
                    o.frequency.linearRampToValueAtTime(30, now + 0.5);
                    g.gain.linearRampToValueAtTime(0, now + 0.5);
                    o.start(); o.stop(now + 0.5);
                }
            }
        };

        // --- [3] 게임 상태 ---
        let state = { gold: 10000, level: 0, working: false };

        // --- [4] 핵심 로직 ---
        function changeScreen(name) {
            document.querySelectorAll('[id^="screen-"]').forEach(s => s.classList.add('hidden'));
            document.getElementById(`screen-${name}`).classList.remove('hidden');
            if(name === 'playing') updateUI();
        }

        function updateUI() {
            const d = LEVEL_DATA[state.level];
            document.getElementById('gold-display').innerText = `${state.gold.toLocaleString()} G`;
            document.getElementById('level-display').innerText = `+${state.level}`;
            document.getElementById('name-display').innerText = state.level === 0 ? "기본검" : "화염검";
            document.getElementById('prob-display').innerText = state.level < 20 ? `${d.prob}%` : "MAX";
            document.getElementById('cost-display').innerText = state.level < 20 ? `${d.cost.toLocaleString()} G` : "-";
            document.getElementById('sell-price-display').innerText = `${d.sell.toLocaleString()} G`;
            
            // 글로우 색상 변경
            document.documentElement.style.setProperty('--sword-glow', d.color);

            // 이미지 경로 처리 (image 폴더 기준)
            const img = document.getElementById('sword-image');
            const path = state.level === 0 ? `image/기본검.png` : `image/화염검 _ ${Math.min(state.level, 10)}.png`;
            img.src = path;
            
            img.onerror = () => {
                log(`[시스템] 이미지 누락: ${path}`, 'text-red-900');
                img.src = 'https://via.placeholder.com/400?text=Missing+Asset';
            };

            document.getElementById('sword-parent').style.transform = `scale(${1 + state.level * 0.02})`;
        }

        function log(msg, colorClass) {
            const entry = document.createElement('div');
            entry.className = `log-entry ${colorClass} mb-1`;
            entry.innerHTML = `<span class="opacity-30 mr-2">>>></span>${msg}`;
            const box = document.getElementById('log-box');
            box.prepend(entry);
        }

        function triggerEffect(type) {
            const flash = document.getElementById('flash-effect');
            flash.classList.remove('flash-success', 'flash-fail');
            void flash.offsetWidth;
            flash.classList.add(type === 'success' ? 'flash-success' : 'flash-fail');

            const container = document.getElementById('effect-container');
            container.innerHTML = '';
            
            const burst = document.createElement('div');
            burst.className = `w-64 h-64 rounded-full effect-burst ${type === 'success' ? 'bg-white/30' : 'bg-red-600/30'} blur-2xl`;
            container.appendChild(burst);

            if(type === 'success') {
                const text = document.createElement('div');
                text.className = 'absolute text-white font-black text-6xl animate-float-up italic tracking-tighter';
                text.innerText = 'SUCCESS';
                container.appendChild(text);
            }
        }

        document.getElementById('btn-enhance').onclick = () => {
            if (state.working || state.level >= 20) return;
            const d = LEVEL_DATA[state.level];
            if (state.gold < d.cost) {
                log("마력이 부족합니다. (재화 부족)", "text-red-400");
                return;
            }

            state.working = true;
            state.gold -= d.cost;
            Sound.play('hit');
            log(`의식 거행 중... (-${d.cost.toLocaleString()} G)`, "text-gray-500");
            
            const sword = document.getElementById('sword-parent');
            sword.classList.add('opacity-30', 'blur-md', 'scale-90');

            setTimeout(() => {
                const success = Math.random() * 100 < d.prob;
                sword.classList.remove('opacity-30', 'blur-md', 'scale-90');
                
                if (success) {
                    state.level++;
                    log(`강화 성공! +${state.level} 레벨 도달`, "text-green-400 font-bold");
                    Sound.play('success');
                    triggerEffect('success');
                } else {
                    state.level = 0;
                    log(`강화 실패... 무기가 파괴되었습니다.`, "text-red-600 font-bold");
                    Sound.play('fail');
                    triggerEffect('fail');
                    document.getElementById('screen-playing').classList.add('animate-shake');
                    setTimeout(() => document.getElementById('screen-playing').classList.remove('animate-shake'), 400);
                }
                
                state.working = false;
                updateUI();
                
                if (state.gold < 100 && state.level === 0) {
                    setTimeout(() => document.getElementById('modal-fairy').classList.remove('hidden'), 1000);
                }
            }, 800);
        };

        document.getElementById('btn-sell').onclick = () => {
            if (state.working) return;
            const price = LEVEL_DATA[state.level].sell;
            state.gold += price;
            log(`판매 완료. ${price.toLocaleString()} G 획득.`, "text-yellow-600");
            state.level = 0;
            updateUI();
            Sound.play('success');
        };

        function receiveFairy() {
            state.gold += 5000;
            document.getElementById('modal-fairy').classList.add('hidden');
            updateUI();
            log("요정의 은총으로 재기할 힘을 얻었습니다.", "text-yellow-400");
            Sound.play('success');
        }

        // 초기 시작 시퀀스
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('screen-loading').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('screen-loading').classList.add('hidden');
                    changeScreen('menu');
                }, 1000);
            }, 2000);
        };
    </script>
</body>
</html>
