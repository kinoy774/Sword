<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>검 강화하기 - 전설의 대장장이</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');

        :root {
            --bg-color: #0f0f0f;
            --accent-red: #ff3e3e;
            --accent-gold: #ffd700;
            --panel-bg: rgba(25, 25, 25, 0.95);
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        #game-container {
            width: 100%;
            max-width: 450px;
            height: 100%;
            max-height: 800px;
            aspect-ratio: 9 / 16;
            position: relative;
            background: radial-gradient(circle at center, #2c1a1a 0%, #0f0f0f 100%);
            border: 1px solid #333;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        #loading-screen {
            position: absolute;
            inset: 0;
            background: #000;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease-out;
        }

        .loading-bar-bg {
            width: 70%;
            height: 4px;
            background: #222;
            margin-top: 20px;
            border-radius: 2px;
            overflow: hidden;
        }

        .loading-bar-fill {
            width: 0%;
            height: 100%;
            background: var(--accent-red);
            box-shadow: 0 0 10px var(--accent-red);
        }

        #main-menu {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 500;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .status-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            z-index: 10;
        }

        .sword-display {
            position: relative;
            height: 55%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .magic-circle {
            position: absolute;
            width: 320px;
            height: 320px;
            border: 1px solid rgba(255, 62, 62, 0.15);
            border-radius: 50%;
            animation: rotate 25s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .sword-image {
            width: 280px;
            height: 280px;
            object-fit: contain;
            z-index: 20;
            filter: drop-shadow(0 0 15px rgba(0, 0, 0, 0.8));
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .action-panel {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 25px 20px 40px 20px;
            background: var(--panel-bg);
            border-top: 1px solid #444;
            border-radius: 35px 35px 0 0;
            z-index: 30;
        }

        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            font-weight: 900;
            font-size: 1.2rem;
            margin-bottom: 12px;
            transition: all 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-enhance {
            background: linear-gradient(135deg, #8b0000 0%, #ff3e3e 100%);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-sell {
            background: #2a2a2a;
            border: 1px solid #444;
        }

        #notification {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(15, 15, 15, 0.95);
            padding: 25px 50px;
            border-radius: 15px;
            border: 2px solid var(--accent-red);
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }

        #notification.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        #bailout-modal {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 3000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .bailout-content {
            background: #1a1a1a;
            padding: 35px 25px;
            border-radius: 25px;
            border: 1px solid var(--accent-gold);
            text-align: center;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="loading-screen">
        <h1 class="text-3xl font-black italic text-white">THE SMITH</h1>
        <div class="loading-bar-bg">
            <div id="loading-bar" class="loading-bar-fill"></div>
        </div>
        <p class="mt-4 text-[10px] text-gray-500 uppercase tracking-widest">Forging Assets...</p>
    </div>

    <div id="main-menu">
        <h1 class="text-5xl font-black mb-10 text-white">검 강화하기</h1>
        <button onclick="startGame()" class="px-14 py-4 bg-white text-black font-black rounded-full shadow-xl">
            시작하기
        </button>
    </div>

    <div class="status-header">
        <div class="flex flex-col">
            <span class="text-gray-500 text-[10px] font-bold">BALANCE</span>
            <span id="money-display" class="text-xl font-black text-yellow-500">10,000 KRW</span>
        </div>
        <div class="flex flex-col items-end">
            <span class="text-gray-500 text-[10px] font-bold">ENCHANT</span>
            <span id="level-display" class="text-xl font-black text-white">Lv. 0</span>
        </div>
    </div>

    <div class="sword-display">
        <div class="magic-circle"></div>
        <img id="sword-img" src="image/기본검.png" alt="Sword" class="sword-image" 
             onerror="this.src='https://via.placeholder.com/280/222/555?text=Check+Filename'">
        <div class="sword-info text-center mt-4 z-20">
            <h2 id="sword-name" class="text-3xl font-black mb-1">기본검</h2>
            <p id="sword-attr" class="text-xs text-gray-500 uppercase tracking-widest">Normal Type</p>
        </div>
    </div>

    <div class="action-panel">
        <div class="flex justify-between mb-5 px-1">
            <div class="flex flex-col">
                <span class="text-[10px] text-gray-500 font-bold">SUCCESS RATE</span>
                <span id="chance-display" class="text-base font-black text-green-500">100%</span>
            </div>
            <div class="flex flex-col items-end">
                <span class="text-[10px] text-gray-500 font-bold">COST</span>
                <span id="cost-display" class="text-base font-black text-red-500">1,000 KRW</span>
            </div>
        </div>

        <button id="btn-enhance" onclick="enhanceSword()" class="btn btn-enhance">강화하기</button>
        <button id="btn-sell" onclick="sellSword()" class="btn btn-sell">
            <span id="sell-value-display">판매하기 (0 KRW)</span>
        </button>
    </div>

    <div id="notification">
        <h3 id="noti-title" class="text-2xl font-black mb-1">SUCCESS</h3>
        <p id="noti-desc" class="text-sm text-gray-400">강화에 성공했습니다!</p>
    </div>

    <div id="bailout-modal">
        <div class="bailout-content">
            <h2 class="text-2xl font-black mb-3 text-yellow-500">자금 지원</h2>
            <p class="text-gray-400 mb-8 text-sm">돈이 없으시군요 제가 도와드리죠!</p>
            <div class="text-3xl font-black mb-10 text-white">+5,000 KRW</div>
            <button onclick="receiveBailout()" class="w-full py-4 bg-yellow-500 text-black font-black rounded-xl">지원금 받기</button>
        </div>
    </div>
</div>

<script>
    const config = {
        initialMoney: 10000,
        bailoutAmount: 5000,
        levels: [
            { chance: 100, cost: 1000, sellMult: 1.5 },
            { chance: 90, cost: 1500, sellMult: 1.8 },
            { chance: 80, cost: 2500, sellMult: 2.2 },
            { chance: 70, cost: 4000, sellMult: 2.8 },
            { chance: 60, cost: 7000, sellMult: 3.5 },
            { chance: 50, cost: 12000, sellMult: 4.5 },
            { chance: 40, cost: 20000, sellMult: 6.0 },
            { chance: 30, cost: 35000, sellMult: 8.5 },
            { chance: 20, cost: 60000, sellMult: 12.0 },
            { chance: 10, cost: 100000, sellMult: 20.0 }
        ]
    };

    let state = {
        money: config.initialMoney,
        currentLevel: 0,
        attribute: '일반',
        totalSpent: 0,
        isEnhancing: false
    };

    const moneyEl = document.getElementById('money-display');
    const levelEl = document.getElementById('level-display');
    const swordImgEl = document.getElementById('sword-img');
    const swordNameEl = document.getElementById('sword-name');
    const swordAttrEl = document.getElementById('sword-attr');
    const chanceEl = document.getElementById('chance-display');
    const costEl = document.getElementById('cost-display');
    const sellDisplayEl = document.getElementById('sell-value-display');
    const notificationEl = document.getElementById('notification');
    const bailoutModal = document.getElementById('bailout-modal');

    (function initLoader() {
        let progress = 0;
        const bar = document.getElementById('loading-bar');
        const loader = setInterval(() => {
            progress += 10;
            if (progress >= 100) {
                clearInterval(loader);
                setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                }, 300);
            }
            bar.style.width = progress + '%';
        }, 100);
    })();

    function startGame() {
        document.getElementById('main-menu').style.display = 'none';
        updateUI();
    }

    function updateUI() {
        moneyEl.textContent = state.money.toLocaleString() + ' KRW';
        levelEl.textContent = 'Lv. ' + state.currentLevel;
        
        if (state.currentLevel === 0) {
            swordImgEl.src = 'image/기본검.png';
            swordNameEl.textContent = '기본검';
            swordAttrEl.textContent = 'Normal Type';
        } else {
            // 사용자님의 캡처본에 따른 파일명 공백 반영: '화염검 _ 1.png'
            swordImgEl.src = `image/화염검 _ ${state.currentLevel}.png`;
            swordNameEl.textContent = `화염검 +${state.currentLevel}`;
            swordAttrEl.textContent = `Fire Type`;
        }

        if (state.currentLevel < 10) {
            const data = config.levels[state.currentLevel];
            chanceEl.textContent = data.chance + '%';
            costEl.textContent = data.cost.toLocaleString() + ' KRW';
            costEl.style.color = state.money >= data.cost ? '#4ade80' : '#f87171';
        } else {
            chanceEl.textContent = 'MAX';
            costEl.textContent = '---';
        }

        const sellValue = calculateSellValue();
        sellDisplayEl.textContent = `판매하기 (${sellValue.toLocaleString()} KRW)`;
        checkBailout();
    }

    function calculateSellValue() {
        if (state.currentLevel === 0) return 0;
        const multiplier = config.levels[state.currentLevel - 1].sellMult;
        return Math.floor(state.totalSpent * multiplier);
    }

    function enhanceSword() {
        if (state.isEnhancing || state.currentLevel >= 10) return;
        const data = config.levels[state.currentLevel];
        if (state.money < data.cost) {
            showNotification('FAILED', '자금이 부족합니다.', 'fail');
            return;
        }

        state.isEnhancing = true;
        state.money -= data.cost;
        state.totalSpent += data.cost;
        updateUI();
        
        swordImgEl.style.transform = 'scale(1.2)';
        setTimeout(() => {
            if (Math.random() * 100 < data.chance) {
                state.currentLevel++;
                showNotification('SUCCESS', '제련에 성공했습니다!', 'success');
            } else {
                state.currentLevel = 0;
                state.totalSpent = 0;
                showNotification('FAILED', '검이 파괴되었습니다.', 'fail');
            }
            state.isEnhancing = false;
            swordImgEl.style.transform = 'scale(1)';
            updateUI();
        }, 500);
    }

    function sellSword() {
        if (state.currentLevel === 0) return;
        const val = calculateSellValue();
        state.money += val;
        showNotification('SOLD', `${val.toLocaleString()} KRW 획득!`, 'success');
        state.currentLevel = 0;
        state.totalSpent = 0;
        updateUI();
    }

    function checkBailout() {
        const nextCost = state.currentLevel < 10 ? config.levels[state.currentLevel].cost : Infinity;
        if (state.money < nextCost && state.currentLevel === 0) {
            setTimeout(() => bailoutModal.style.display = 'flex', 500);
        }
    }

    function receiveBailout() {
        state.money += config.bailoutAmount;
        bailoutModal.style.display = 'none';
        updateUI();
    }

    function showNotification(title, desc, type) {
        notificationEl.querySelector('h3').textContent = title;
        notificationEl.querySelector('p').textContent = desc;
        notificationEl.style.borderColor = type === 'success' ? '#4ade80' : '#f87171';
        notificationEl.classList.add('active');
        setTimeout(() => notificationEl.classList.remove('active'), 1500);
    }
</script>
</body>
</html>
