<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>검 강화하기 - 전설의 대장장이</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');

        :root {
            --bg-color: #0f0f0f;
            --accent-red: #ff3e3e;
            --accent-gold: #ffd700;
            --panel-bg: rgba(15, 15, 15, 0.98);
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            -webkit-user-select: none;
            user-select: none;
        }

        #game-container {
            width: 100%;
            max-width: 450px;
            height: 100%;
            max-height: 800px;
            aspect-ratio: 9 / 16;
            position: relative;
            background: radial-gradient(circle at center, #2c1a1a 0%, #050505 100%);
            border: 1px solid #222;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0,0,0,1);
        }

        /* 로딩 화면 */
        #loading-screen {
            position: absolute;
            inset: 0;
            background: #000;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* 메인 메뉴 */
        #main-menu {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 500;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .status-header {
            padding: 25px 20px;
            display: flex;
            justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,1), transparent);
            z-index: 10;
        }

        /* 검 전시 구역 */
        .sword-display {
            position: relative;
            height: 48%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .magic-circle {
            position: absolute;
            width: 360px;
            height: 360px;
            border: 1px solid rgba(255, 62, 62, 0.08);
            border-radius: 50%;
            animation: rotate 40s linear infinite;
        }

        .magic-circle-inner {
            position: absolute;
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, rgba(255, 62, 62, 0.12) 0%, transparent 75%);
            border-radius: 50%;
            z-index: 5;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .sword-image {
            width: 320px;
            height: 320px;
            object-fit: contain;
            z-index: 20;
            filter: drop-shadow(0 0 20px rgba(0, 0, 0, 1));
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* RPG 정보창 */
        .stats-panel {
            padding: 18px 25px;
            background: rgba(10, 10, 10, 0.6);
            border-top: 1px solid rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.03);
            margin: 5px 0;
            font-size: 0.9rem;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            color: #999;
        }

        .stat-value {
            color: #eee;
            font-weight: 800;
        }

        .stat-up {
            color: #22c55e;
            font-size: 0.75rem;
            margin-left: 6px;
            font-weight: 400;
        }

        /* 조작 패널 */
        .action-panel {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 20px 20px 45px 20px;
            background: var(--panel-bg);
            border-top: 1px solid #222;
            border-radius: 35px 35px 0 0;
            z-index: 30;
        }

        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 14px;
            font-weight: 900;
            font-size: 1.15rem;
            margin-bottom: 12px;
            transition: all 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .btn-enhance {
            background: linear-gradient(135deg, #7f1d1d 0%, #ef4444 100%);
            box-shadow: 0 6px 25px rgba(239, 68, 68, 0.25);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-enhance:active { transform: scale(0.96); filter: brightness(1.3); }

        .btn-sell {
            background: #1f1f1f;
            border: 1px solid #333;
            color: #999;
            font-size: 1rem;
        }

        #notification {
            position: absolute;
            top: 38%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(5, 5, 5, 0.98);
            padding: 25px 45px;
            border-radius: 12px;
            border: 1px solid var(--accent-red);
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            box-shadow: 0 15px 50px rgba(0,0,0,1);
        }

        #notification.active { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    </style>
</head>
<body>

<div id="game-container">
    <!-- 로딩 화면 -->
    <div id="loading-screen">
        <h1 class="text-3xl font-black italic text-white tracking-tighter">THE SMITH</h1>
        <div class="w-52 h-1 bg-zinc-900 mt-5 rounded-full overflow-hidden">
            <div id="loading-bar" class="h-full bg-red-600 w-0 transition-all"></div>
        </div>
        <p class="mt-4 text-[10px] text-zinc-600 font-bold tracking-[0.4em] uppercase">Forging Assets</p>
    </div>

    <!-- 메인 메뉴 -->
    <div id="main-menu">
        <h1 class="text-5xl font-black mb-14 text-white italic tracking-tighter">검 강화하기</h1>
        <button onclick="startGame()" class="px-16 py-4 bg-white text-black font-black rounded-full active:scale-95 transition-transform shadow-2xl">
            시작하기
        </button>
    </div>

    <!-- 헤더 상태창 -->
    <div class="status-header">
        <div>
            <p class="text-[10px] text-zinc-600 font-black tracking-widest">BALANCE</p>
            <p id="money-display" class="text-xl font-black text-yellow-500">10,000 KRW</p>
        </div>
        <div class="text-right">
            <p class="text-[10px] text-zinc-600 font-black tracking-widest">ENCHANT</p>
            <p id="level-display" class="text-xl font-black italic text-white">Lv. 0</p>
        </div>
    </div>

    <!-- 검 전시 구역 -->
    <div class="sword-display">
        <div class="magic-circle"></div>
        <div class="magic-circle-inner"></div>
        <img id="sword-img" src="image/기본검.png" alt="Sword" class="sword-image">
        <div class="text-center z-20 mt-5">
            <h2 id="sword-name" class="text-3xl font-black drop-shadow-xl text-white">기본검</h2>
            <p id="sword-attr" class="text-[10px] text-red-500 font-black uppercase tracking-[0.4em] mt-1">Normal Grade</p>
        </div>
    </div>

    <!-- 스탯 정보 -->
    <div class="stats-panel">
        <div class="stat-row">
            <span>무기 공격력</span>
            <span><span id="stat-atk" class="stat-value">10</span> <span id="atk-up" class="stat-up"></span></span>
        </div>
        <div class="stat-row">
            <span>기본 명중률</span>
            <span><span id="stat-acc" class="stat-value">85</span>% <span id="acc-up" class="stat-up"></span></span>
        </div>
        <div class="stat-row">
            <span>부여 속성</span>
            <span id="stat-opt" class="stat-value text-zinc-700">없음</span>
        </div>
    </div>

    <!-- 조작 창 -->
    <div class="action-panel">
        <div class="flex justify-between mb-5 px-1">
            <div>
                <p class="text-[9px] text-zinc-500 font-black">CHANCE</p>
                <p id="chance-display" class="text-base font-black text-green-500">100%</p>
            </div>
            <div class="text-right">
                <p class="text-[9px] text-zinc-500 font-black">ENHANCE COST</p>
                <p id="cost-display" class="text-base font-black text-red-500">1,000 KRW</p>
            </div>
        </div>

        <button id="btn-enhance" onclick="enhanceSword()" class="btn btn-enhance">강화하기</button>
        <button id="btn-sell" onclick="sellSword()" class="btn btn-sell">
            <span id="sell-value-display">판매 (0 KRW)</span>
        </button>
    </div>

    <!-- 알림 팝업 -->
    <div id="notification">
        <h3 id="noti-title" class="text-2xl font-black mb-1 italic">SUCCESS</h3>
        <p id="noti-desc" class="text-sm text-zinc-500">장비가 강화되었습니다.</p>
    </div>

    <!-- 회생지원금 모달 -->
    <div id="bailout-modal" class="absolute inset-0 bg-black/95 z-[3000] hidden flex-col justify-center items-center p-10 text-center">
        <div class="border border-yellow-600/20 p-10 rounded-3xl bg-zinc-950 shadow-2xl">
            <div class="w-14 h-14 bg-yellow-500/10 rounded-full flex items-center justify-center mx-auto mb-6">
                <span class="text-2xl">💸</span>
            </div>
            <h2 class="text-2xl font-black text-yellow-500 mb-4">자금 지원</h2>
            <p class="text-zinc-500 mb-8 text-sm leading-relaxed">돈이 없으시군요 제가 도와드리죠!<br>재기를 응원합니다.</p>
            <p class="text-4xl font-black text-white mb-12 italic">+5,000 KRW</p>
            <button onclick="receiveBailout()" class="w-full py-4 bg-yellow-500 text-black font-black rounded-xl active:scale-95 transition-transform">지원금 받기</button>
        </div>
    </div>
</div>

<script>
    const config = {
        initialMoney: 10000,
        bailoutAmount: 5000,
        levels: [
            { chance: 100, cost: 1000, sellMult: 1.5, atk: 10, acc: 85 },
            { chance: 90, cost: 1500, sellMult: 1.8, atk: 18, acc: 86 },
            { chance: 80, cost: 2800, sellMult: 2.2, atk: 28, acc: 87 },
            { chance: 70, cost: 4500, sellMult: 2.8, atk: 42, acc: 88 },
            { chance: 60, cost: 8000, sellMult: 3.5, atk: 65, acc: 89 },
            { chance: 50, cost: 14000, sellMult: 4.5, atk: 98, acc: 90 },
            { chance: 40, cost: 25000, sellMult: 6.0, atk: 145, acc: 91 },
            { chance: 30, cost: 45000, sellMult: 8.5, atk: 220, acc: 92 },
            { chance: 20, cost: 80000, sellMult: 12.0, atk: 350, acc: 94 },
            { chance: 10, cost: 150000, sellMult: 20.0, atk: 580, acc: 96 },
            { chance: 5, cost: 300000, sellMult: 50.0, atk: 999, acc: 99 }
        ]
    };

    let state = {
        money: config.initialMoney,
        currentLevel: 0,
        totalSpent: 0,
        isEnhancing: false
    };

    // 이미지 경로 처리 함수: 수정된 파일 이름 반영
    function getSwordImagePath(lv) {
        if (lv === 0) return 'image/기본검.png';
        return `image/화염검${lv}.png`;
    }

    const moneyEl = document.getElementById('money-display');
    const levelEl = document.getElementById('level-display');
    const swordImgEl = document.getElementById('sword-img');
    const swordNameEl = document.getElementById('sword-name');
    const swordAttrEl = document.getElementById('sword-attr');
    const chanceEl = document.getElementById('chance-display');
    const costEl = document.getElementById('cost-display');
    const sellDisplayEl = document.getElementById('sell-value-display');

    const statAtk = document.getElementById('stat-atk');
    const statAcc = document.getElementById('stat-acc');
    const statOpt = document.getElementById('stat-opt');
    const atkUp = document.getElementById('atk-up');
    const accUp = document.getElementById('acc-up');

    // 로딩바 애니메이션
    (function init() {
        let p = 0;
        const bar = document.getElementById('loading-bar');
        const interval = setInterval(() => {
            p += Math.floor(Math.random() * 10) + 5;
            if (p >= 100) {
                p = 100;
                clearInterval(interval);
                setTimeout(() => {
                    document.getElementById('loading-screen').style.opacity = '0';
                    setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 500);
                }, 300);
            }
            bar.style.width = p + '%';
        }, 50);
    })();

    function startGame() {
        document.getElementById('main-menu').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('main-menu').style.display = 'none';
        }, 500);
        updateUI();
    }

    function updateUI() {
        moneyEl.textContent = state.money.toLocaleString() + ' KRW';
        levelEl.textContent = 'Lv. ' + state.currentLevel;
        
        // 새로운 경로 규칙 적용
        swordImgEl.src = getSwordImagePath(state.currentLevel);

        const currentData = config.levels[state.currentLevel];
        const nextData = config.levels[state.currentLevel + 1];

        // 스탯창 정보 갱신
        statAtk.textContent = currentData.atk;
        statAcc.textContent = currentData.acc;
        
        if (nextData) {
            atkUp.textContent = `(▲${nextData.atk - currentData.atk})`;
            accUp.textContent = `(▲${nextData.acc - currentData.acc})`;
            chanceEl.textContent = currentData.chance + '%';
            costEl.textContent = currentData.cost.toLocaleString() + ' KRW';
            costEl.style.color = state.money >= currentData.cost ? '#22c55e' : '#ef4444';
        } else {
            atkUp.textContent = '';
            accUp.textContent = '';
            chanceEl.textContent = 'MAX';
            costEl.textContent = '---';
        }

        if (state.currentLevel === 0) {
            swordNameEl.textContent = '기본검';
            swordAttrEl.textContent = 'Normal Grade';
            statOpt.textContent = '없음';
            statOpt.className = 'stat-value text-zinc-700';
        } else {
            swordNameEl.textContent = `화염검 +${state.currentLevel}`;
            swordAttrEl.textContent = 'Fire Grade';
            statOpt.textContent = '화염 속성 공격';
            statOpt.className = 'stat-value text-red-500';
        }

        const sellVal = calculateSellValue();
        sellDisplayEl.textContent = `판매 (${sellVal.toLocaleString()} KRW)`;
        
        checkBailout();
    }

    function calculateSellValue() {
        if (state.currentLevel === 0) return 0;
        const multiplier = config.levels[state.currentLevel - 1].sellMult;
        return Math.floor(state.totalSpent * multiplier);
    }

    function enhanceSword() {
        if (state.isEnhancing || state.currentLevel >= 10) return;
        const data = config.levels[state.currentLevel];

        if (state.money < data.cost) {
            showNotification('자금 부족', '강화에 필요한 비용이 부족합니다.', 'fail');
            return;
        }

        state.isEnhancing = true;
        state.money -= data.cost;
        state.totalSpent += data.cost;
        updateUI();

        // 강화 연출
        swordImgEl.style.transform = 'scale(1.15) rotate(3deg)';
        swordImgEl.style.filter = 'brightness(2.5) drop-shadow(0 0 30px white)';

        setTimeout(() => {
            const success = Math.random() * 100 < data.chance;
            if (success) {
                state.currentLevel++;
                showNotification('SUCCESS', '강화 공정에 성공했습니다!', 'success');
            } else {
                state.currentLevel = 0;
                state.totalSpent = 0;
                showNotification('FAILED', '강화 실패로 무기가 파괴되었습니다.', 'fail');
            }
            state.isEnhancing = false;
            swordImgEl.style.transform = 'scale(1) rotate(0deg)';
            swordImgEl.style.filter = '';
            updateUI();
        }, 700);
    }

    function sellSword() {
        if (state.currentLevel === 0) return;
        const v = calculateSellValue();
        state.money += v;
        showNotification('SOLD', `장비를 판매하여 ${v.toLocaleString()} KRW를 받았습니다.`, 'success');
        state.currentLevel = 0;
        state.totalSpent = 0;
        updateUI();
    }

    function checkBailout() {
        if (state.money < 1000 && state.currentLevel === 0) {
            setTimeout(() => {
                document.getElementById('bailout-modal').style.display = 'flex';
            }, 1000);
        }
    }

    function receiveBailout() {
        state.money += config.bailoutAmount;
        document.getElementById('bailout-modal').style.display = 'none';
        updateUI();
    }

    function showNotification(title, desc, type) {
        const n = document.getElementById('notification');
        n.querySelector('h3').textContent = title;
        n.querySelector('p').textContent = desc;
        
        const color = type === 'success' ? '#22c55e' : '#ef4444';
        n.style.borderColor = color;
        n.querySelector('h3').style.color = color;
        
        n.classList.add('active');
        setTimeout(() => n.classList.remove('active'), 1800);
    }
</script>
</body>
</html>
