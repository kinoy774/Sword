<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>검 강화하기 - 전설의 대장장이</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');

        :root {
            --bg-color: #0f0f0f;
            --accent-red: #ff3e3e;
            --accent-gold: #ffd700;
            --panel-bg: rgba(25, 25, 25, 0.95);
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        /* 16:9 모바일 최적화 컨테이너 */
        #game-container {
            width: 100%;
            max-width: 450px;
            height: 100%;
            max-height: 800px;
            aspect-ratio: 9 / 16;
            position: relative;
            background: radial-gradient(circle at center, #2c1a1a 0%, #0f0f0f 100%);
            border: 1px solid #333;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* 로딩 화면 */
        #loading-screen {
            position: absolute;
            inset: 0;
            background: #000;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease-out;
        }

        .loading-bar-bg {
            width: 70%;
            height: 4px;
            background: #222;
            margin-top: 20px;
            border-radius: 2px;
            overflow: hidden;
        }

        .loading-bar-fill {
            width: 0%;
            height: 100%;
            background: var(--accent-red);
            box-shadow: 0 0 10px var(--accent-red);
        }

        /* 메인 화면 */
        #main-menu {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 500;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* 게임 UI */
        .status-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            z-index: 10;
            position: relative;
        }

        .sword-display {
            position: relative;
            height: 55%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        /* 강화 마법진 효과 */
        .magic-circle {
            position: absolute;
            width: 320px;
            height: 320px;
            border: 1px solid rgba(255, 62, 62, 0.15);
            border-radius: 50%;
            animation: rotate 25s linear infinite;
        }

        .magic-circle::before {
            content: '';
            position: absolute;
            inset: 15px;
            border: 2px dashed rgba(255, 62, 62, 0.1);
            border-radius: 50%;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .sword-image {
            width: 280px;
            height: 280px;
            object-fit: contain;
            z-index: 20;
            filter: drop-shadow(0 0 15px rgba(0, 0, 0, 0.8));
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .sword-info {
            text-align: center;
            margin-top: 10px;
            z-index: 20;
        }

        .action-panel {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 25px 20px 40px 20px;
            background: var(--panel-bg);
            border-top: 1px solid #444;
            border-radius: 35px 35px 0 0;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
            z-index: 30;
        }

        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            font-weight: 900;
            font-size: 1.2rem;
            margin-bottom: 12px;
            transition: all 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-enhance {
            background: linear-gradient(135deg, #8b0000 0%, #ff3e3e 100%);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 20px rgba(255, 62, 62, 0.3);
        }

        .btn-enhance:active { transform: scale(0.96); filter: brightness(1.2); }
        .btn-enhance:disabled { opacity: 0.5; filter: grayscale(1); }

        .btn-sell {
            background: #2a2a2a;
            border: 1px solid #444;
            font-size: 1rem;
        }
        .btn-sell:active { background: #333; }

        /* 알림 팝업 */
        #notification {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(15, 15, 15, 0.95);
            padding: 25px 50px;
            border-radius: 15px;
            border: 2px solid var(--accent-red);
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            min-width: 250px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        #notification.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* 회생지원금 모달 */
        #bailout-modal {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 3000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }

        .bailout-content {
            background: #1a1a1a;
            padding: 35px 25px;
            border-radius: 25px;
            border: 1px solid var(--accent-gold);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.1);
        }

        /* 유틸리티 */
        .text-gold { color: var(--accent-gold); }
        .text-danger { color: var(--accent-red); }
    </style>
</head>
<body>

<div id="game-container">
    <!-- 로딩 화면 -->
    <div id="loading-screen">
        <h1 class="text-3xl font-black italic tracking-tighter text-white">THE SMITH</h1>
        <div class="loading-bar-bg">
            <div id="loading-bar" class="loading-bar-fill"></div>
        </div>
        <p class="mt-4 text-[10px] text-gray-500 uppercase tracking-[0.3em]">Forging Assets...</p>
    </div>

    <!-- 메인 메뉴 -->
    <div id="main-menu">
        <div class="mb-12">
            <h1 class="text-5xl font-black mb-3 text-white tracking-tighter">검 강화하기</h1>
            <div class="h-1 w-20 bg-red-600 mx-auto"></div>
            <p class="text-gray-400 mt-4 font-light">나만의 전설을 제련하세요</p>
        </div>
        <button onclick="startGame()" class="px-14 py-4 bg-white text-black font-black rounded-full hover:bg-gray-200 transition-all active:scale-95 shadow-xl">
            시작하기
        </button>
    </div>

    <!-- 상단 정보 바 -->
    <div class="status-header">
        <div class="flex flex-col">
            <span class="text-gray-500 text-[10px] font-bold uppercase tracking-widest">Balance</span>
            <span id="money-display" class="text-xl font-black text-gold">10,000 KRW</span>
        </div>
        <div class="flex flex-col items-end">
            <span class="text-gray-500 text-[10px] font-bold uppercase tracking-widest">Enchant</span>
            <span id="level-display" class="text-xl font-black text-white italic">Lv. 0</span>
        </div>
    </div>

    <!-- 검 전시 구역 -->
    <div class="sword-display">
        <div class="magic-circle"></div>
        <img id="sword-img" src="image/기본검.png" alt="Sword" class="sword-image" 
             onerror="this.src='https://via.placeholder.com/280/222/555?text=Sword+Image'">
        <div class="sword-info">
            <h2 id="sword-name" class="text-3xl font-black mb-1 drop-shadow-md">기본검</h2>
            <p id="sword-attr" class="text-[11px] text-gray-500 uppercase tracking-[0.4em] font-bold">Normal Type</p>
        </div>
    </div>

    <!-- 조작 패널 -->
    <div class="action-panel">
        <div class="flex justify-between mb-5 px-1">
            <div class="flex flex-col">
                <span class="text-[10px] text-gray-500 font-bold uppercase">Success Rate</span>
                <span id="chance-display" class="text-base font-black text-green-500">100%</span>
            </div>
            <div class="flex flex-col items-end">
                <span class="text-[10px] text-gray-500 font-bold uppercase">Cost</span>
                <span id="cost-display" class="text-base font-black text-red-500">1,000 KRW</span>
            </div>
        </div>

        <button id="btn-enhance" onclick="enhanceSword()" class="btn btn-enhance">
            제련하기
        </button>
        <button id="btn-sell" onclick="sellSword()" class="btn btn-sell">
            <span id="sell-value-display">판매하기 (0 KRW)</span>
        </button>
    </div>

    <!-- 시스템 알림 -->
    <div id="notification">
        <h3 id="noti-title" class="text-2xl font-black mb-1 italic">SUCCESS</h3>
        <p id="noti-desc" class="text-sm text-gray-400 font-light">강화에 성공했습니다!</p>
    </div>

    <!-- 회생지원금 모달 -->
    <div id="bailout-modal">
        <div class="bailout-content">
            <div class="w-16 h-16 bg-yellow-500/10 rounded-full flex items-center justify-center mx-auto mb-6 border border-yellow-500/30">
                <span class="text-3xl">💰</span>
            </div>
            <h2 class="text-2xl font-black mb-3 text-gold">자금 지원</h2>
            <p class="text-gray-400 mb-8 leading-relaxed text-sm">돈이 없으시군요 제가 도와드리죠!</p>
            <div class="text-3xl font-black mb-10 text-white italic">+5,000 KRW</div>
            <button onclick="receiveBailout()" class="w-full py-4 bg-gold text-black font-black rounded-xl active:scale-95 transition-transform">
                지원금 받기
            </button>
        </div>
    </div>
</div>

<script>
    // 밸런스 설정
    const config = {
        initialMoney: 10000,
        bailoutAmount: 5000,
        attributes: ['화염', '얼음', '대지', '어둠', '빛'],
        levels: [
            { chance: 100, cost: 1000, sellMult: 1.5 },
            { chance: 90, cost: 1500, sellMult: 1.8 },
            { chance: 80, cost: 2500, sellMult: 2.2 },
            { chance: 70, cost: 4000, sellMult: 2.8 },
            { chance: 60, cost: 7000, sellMult: 3.5 },
            { chance: 50, cost: 12000, sellMult: 4.5 },
            { chance: 40, cost: 20000, sellMult: 6.0 },
            { chance: 30, cost: 35000, sellMult: 8.5 },
            { chance: 20, cost: 60000, sellMult: 12.0 },
            { chance: 10, cost: 100000, sellMult: 20.0 }
        ]
    };

    let state = {
        money: config.initialMoney,
        currentLevel: 0,
        attribute: '일반',
        totalSpent: 0,
        isEnhancing: false
    };

    // DOM 캐싱
    const moneyEl = document.getElementById('money-display');
    const levelEl = document.getElementById('level-display');
    const swordImgEl = document.getElementById('sword-img');
    const swordNameEl = document.getElementById('sword-name');
    const swordAttrEl = document.getElementById('sword-attr');
    const chanceEl = document.getElementById('chance-display');
    const costEl = document.getElementById('cost-display');
    const sellDisplayEl = document.getElementById('sell-value-display');
    const notificationEl = document.getElementById('notification');
    const bailoutModal = document.getElementById('bailout-modal');
    const enhanceBtn = document.getElementById('btn-enhance');

    // 리소스 로딩과 별개로 로딩바 즉시 실행 (stuck 방지)
    (function initLoader() {
        let progress = 0;
        const bar = document.getElementById('loading-bar');
        const screen = document.getElementById('loading-screen');
        
        const loader = setInterval(() => {
            progress += Math.random() * 20;
            if (progress >= 100) {
                progress = 100;
                clearInterval(loader);
                setTimeout(() => {
                    screen.style.opacity = '0';
                    setTimeout(() => screen.style.display = 'none', 500);
                }, 400);
            }
            bar.style.width = progress + '%';
        }, 60);
    })();

    function startGame() {
        document.getElementById('main-menu').style.display = 'none';
        updateUI();
    }

    function updateUI() {
        moneyEl.textContent = state.money.toLocaleString() + ' KRW';
        levelEl.textContent = 'Lv. ' + state.currentLevel;
        
        if (state.currentLevel === 0) {
            swordImgEl.src = 'image/기본검.png';
            swordNameEl.textContent = '기본검';
            swordAttrEl.textContent = 'Normal Type';
            state.attribute = '일반';
        } else {
            // 현재 화염검 테스트 단계
            swordImgEl.src = `image/화염검_${state.currentLevel}.png`;
            swordNameEl.textContent = `${state.attribute}검 +${state.currentLevel}`;
            swordAttrEl.textContent = `${state.attribute} Type`;
        }

        if (state.currentLevel < 10) {
            const data = config.levels[state.currentLevel];
            chanceEl.textContent = data.chance + '%';
            costEl.textContent = data.cost.toLocaleString() + ' KRW';
            costEl.style.color = state.money >= data.cost ? '#4ade80' : '#f87171';
            enhanceBtn.disabled = false;
        } else {
            chanceEl.textContent = 'MAX';
            costEl.textContent = '---';
            enhanceBtn.disabled = true;
        }

        const sellValue = calculateSellValue();
        sellDisplayEl.textContent = `판매하기 (${sellValue.toLocaleString()} KRW)`;

        checkBailout();
    }

    function calculateSellValue() {
        if (state.currentLevel === 0) return 0;
        const multiplier = config.levels[state.currentLevel - 1].sellMult;
        return Math.floor(state.totalSpent * multiplier);
    }

    function enhanceSword() {
        if (state.isEnhancing || state.currentLevel >= 10) return;

        const data = config.levels[state.currentLevel];
        if (state.money < data.cost) {
            showNotification('자금 부족', '제련 비용이 부족합니다.', 'fail');
            return;
        }

        state.isEnhancing = true;
        state.money -= data.cost;
        state.totalSpent += data.cost;
        updateUI();
        
        // 애니메이션 효과
        swordImgEl.style.transform = 'scale(1.1) translateY(-10px)';
        swordImgEl.style.filter = 'brightness(2) drop-shadow(0 0 40px white)';

        setTimeout(() => {
            const success = Math.random() * 100 < data.chance;

            if (success) {
                if (state.currentLevel === 0) {
                    state.attribute = '화염'; // 테스트를 위해 화염으로 고정
                }
                state.currentLevel++;
                showNotification('SUCCESS', '강화에 성공했습니다!', 'success');
            } else {
                state.currentLevel = 0;
                state.totalSpent = 0;
                showNotification('FAILED', '강화 실패로 검이 파괴되었습니다.', 'fail');
            }

            state.isEnhancing = false;
            swordImgEl.style.transform = 'scale(1) translateY(0)';
            swordImgEl.style.filter = '';
            updateUI();
        }, 700);
    }

    function sellSword() {
        if (state.currentLevel === 0) return;
        const val = calculateSellValue();
        state.money += val;
        showNotification('SOLD', `${val.toLocaleString()} KRW을 획득했습니다.`, 'success');
        state.currentLevel = 0;
        state.totalSpent = 0;
        state.attribute = '일반';
        updateUI();
    }

    function checkBailout() {
        const nextCost = state.currentLevel < 10 ? config.levels[state.currentLevel].cost : Infinity;
        if (state.money < nextCost && state.currentLevel === 0) {
            setTimeout(() => bailoutModal.style.display = 'flex', 800);
        }
    }

    function receiveBailout() {
        state.money += config.bailoutAmount;
        bailoutModal.style.display = 'none';
        updateUI();
        showNotification('SUPPORT', '지원금을 받았습니다.', 'success');
    }

    function showNotification(title, desc, type) {
        const t = document.getElementById('noti-title');
        const d = document.getElementById('noti-desc');
        t.textContent = title;
        d.textContent = desc;
        
        notificationEl.style.borderColor = type === 'success' ? '#4ade80' : '#f87171';
        t.style.color = type === 'success' ? '#4ade80' : '#f87171';

        notificationEl.classList.add('active');
        setTimeout(() => notificationEl.classList.remove('active'), 1800);
    }
</script>

</body>
</html>
