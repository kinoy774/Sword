<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>전설의 대장간 - 화염의 각성</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Cinzel:wght@700&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #050508;
            color: #e2e8f0;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .font-cinzel { font-family: 'Cinzel', serif; }

        /* --- 고급 애니메이션 효과 --- */
        @keyframes magic-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-magic { animation: magic-spin 60s linear infinite; }

        @keyframes shake-heavy {
            0%, 100% { transform: translate(0, 0); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-10px, 5px); }
            20%, 40%, 60%, 80% { transform: translate(10px, -5px); }
        }
        .shake-heavy { animation: shake-heavy 0.5s cubic-bezier(.36,.07,.19,.97) both; }

        @keyframes flash-white { 0% { background: white; opacity: 1; } 100% { background: transparent; opacity: 0; } }
        .effect-success { animation: flash-white 0.8s ease-out forwards; }

        @keyframes flash-red { 0% { background: #991b1b; opacity: 0.7; } 100% { background: transparent; opacity: 0; } }
        .effect-fail { animation: flash-red 0.8s ease-out forwards; }

        @keyframes float-up-text {
            0% { opacity: 0; transform: translateY(30px) scale(0.5); }
            50% { opacity: 1; transform: translateY(0px) scale(1.2); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
        }
        .float-text { animation: float-up-text 1s ease-out forwards; }

        /* --- 레이아웃 최적화 --- */
        .game-viewport {
            height: 100dvh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        .btn-medieval {
            position: relative;
            background: linear-gradient(to bottom, #7f1d1d, #450a0a);
            border: 1px solid #991b1b;
            box-shadow: 0 4px 0 #2d0606;
            transition: all 0.1s;
        }
        .btn-medieval:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #2d0606;
        }
        .btn-medieval:disabled {
            filter: grayscale(1);
            opacity: 0.5;
            transform: none;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <!-- 섬광 효과 레이어 -->
    <div id="flash-layer" class="fixed inset-0 z-[100] pointer-events-none"></div>

    <div class="game-viewport">
        <!-- [1] 초기 로딩 화면 -->
        <div id="screen-loading" class="fixed inset-0 z-[110] bg-[#050508] flex flex-col items-center justify-center transition-opacity duration-1000">
            <div class="relative w-20 h-20 mb-8">
                <div class="absolute inset-0 border-4 border-red-900/30 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-t-red-600 rounded-full animate-spin"></div>
            </div>
            <h1 class="font-cinzel text-2xl font-bold tracking-[0.4em] text-red-600 animate-pulse">LOADING...</h1>
        </div>

        <!-- [2] 메인 메뉴 화면 -->
        <div id="screen-menu" class="hidden fixed inset-0 z-50 bg-[#050508] flex flex-col items-center justify-center p-8 text-center overflow-hidden">
            <div class="absolute inset-0 opacity-10 pointer-events-none flex items-center justify-center">
                <svg class="w-[120%] animate-magic" viewBox="0 0 500 500">
                    <circle cx="250" cy="250" r="230" stroke="white" stroke-width="1" fill="none" stroke-dasharray="2 10" />
                    <path d="M 250 20 L 480 250 L 250 480 L 20 250 Z" stroke="white" fill="none" />
                </svg>
            </div>
            <div class="z-10">
                <h1 class="font-cinzel text-7xl md:text-9xl font-black mb-4 text-transparent bg-clip-text bg-gradient-to-b from-gray-100 to-gray-600 tracking-tighter">BLACKSMITH</h1>
                <p class="text-red-700 font-bold mb-20 text-lg md:text-xl tracking-[0.5em] uppercase">전설의 무기 강화</p>
                <div class="flex flex-col gap-6 w-80 mx-auto">
                    <button onclick="Game.start()" class="btn-medieval py-6 text-white font-black text-3xl tracking-[0.2em] rounded-sm">시작하기</button>
                    <button onclick="alert('image 폴더에 기본검.png와 화염검 _ 1~10.png를 넣어주세요.')" class="py-4 bg-[#12121a] hover:bg-[#1a1a24] text-gray-500 font-bold text-lg border border-gray-800 transition-all">가이드</button>
                </div>
            </div>
            <p class="absolute bottom-10 font-mono text-[10px] text-gray-700 uppercase tracking-widest">Procedural Audio Engine Enabled</p>
        </div>

        <!-- [3] 게임 플레이 화면 -->
        <div id="screen-playing" class="hidden flex-1 flex flex-col relative overflow-hidden bg-gradient-to-b from-[#0a0a0f] to-black">
            
            <!-- 상단 바 -->
            <header class="flex justify-between items-center px-8 py-6 bg-[#0a0a0f]/90 backdrop-blur-md border-b border-gray-800 shrink-0 z-30">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-yellow-600/10 rounded-full flex items-center justify-center border border-yellow-600/30">
                        <span class="text-yellow-600 font-bold">⛃</span>
                    </div>
                    <span id="gold-display" class="font-cinzel text-2xl font-bold text-gray-100">10,000 G</span>
                </div>
                <div class="flex gap-2">
                    <button onclick="location.reload()" class="px-4 py-2 bg-gray-900 hover:bg-red-900 transition-colors text-[10px] font-bold text-gray-500 hover:text-white border border-gray-800 uppercase tracking-widest">초기화</button>
                </div>
            </header>

            <!-- 게임 메인 영역 -->
            <main id="forge-area" class="flex-1 relative flex flex-col items-center justify-center overflow-hidden">
                <!-- 배경 마법진 -->
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-[0.15]">
                    <svg class="w-[140%] max-w-[900px] animate-magic" viewBox="0 0 500 500">
                        <circle cx="250" cy="250" r="210" stroke="#f87171" stroke-width="1.5" fill="none" stroke-dasharray="10 5" />
                        <circle cx="250" cy="250" r="180" stroke="#f87171" stroke-width="1" fill="none" opacity="0.5" />
                        <path d="M 250 40 L 290 210 L 460 250 L 290 290 L 250 460 L 210 290 L 40 250 L 210 210 Z" stroke="#f87171" fill="none" />
                    </svg>
                </div>

                <!-- 이펙트 레이어 -->
                <div id="particle-layer" class="absolute inset-0 z-40 pointer-events-none flex items-center justify-center"></div>

                <!-- 무기 정보 창 -->
                <div class="text-center mb-10 z-20">
                    <p class="text-gray-500 font-mono text-xs tracking-[0.6em] mb-3 uppercase">Masterwork Progress</p>
                    <h2 class="text-5xl md:text-7xl font-black tracking-tight drop-shadow-[0_10px_20px_rgba(0,0,0,1)] text-gray-100 transition-all duration-300">
                        <span id="level-display" class="text-red-700">+0</span> <span id="name-display">기본검</span>
                    </h2>
                </div>

                <!-- 검 이미지 렌더링 -->
                <div id="sword-canvas" class="relative w-full max-w-lg aspect-square flex items-center justify-center transition-all duration-700 z-10">
                    <img id="sword-image" src="" alt="무기" class="max-w-[85%] max-h-[85%] object-contain drop-shadow-[0_0_30px_rgba(255,255,255,0.1)]">
                </div>
            </main>

            <!-- 컨트롤 및 로그 하단 패널 -->
            <footer class="shrink-0 bg-[#0a0a0f] border-t border-gray-800 z-30 shadow-[0_-20px_50px_rgba(0,0,0,0.9)]">
                <div class="flex flex-col md:flex-row">
                    <!-- 정보 표시 -->
                    <div class="flex-1 p-6 border-b md:border-b-0 md:border-r border-gray-800 flex gap-4">
                        <div class="flex-1 bg-black/40 p-4 rounded border border-gray-800/50 text-center relative overflow-hidden group">
                            <span class="text-[10px] text-gray-500 block uppercase tracking-widest mb-1">성공 확률</span>
                            <span id="prob-display" class="text-green-500 font-bold text-2xl font-mono">100%</span>
                        </div>
                        <div class="flex-1 bg-black/40 p-4 rounded border border-gray-800/50 text-center relative overflow-hidden group">
                            <span class="text-[10px] text-gray-500 block uppercase tracking-widest mb-1">강화 비용</span>
                            <span id="cost-display" class="text-yellow-600 font-bold text-2xl font-mono">100 G</span>
                        </div>
                    </div>
                    <!-- 액션 버튼 -->
                    <div class="flex-1 p-6 flex gap-4 bg-[#0d0d14]">
                        <button id="btn-enhance" class="btn-medieval flex-[3] py-6 text-white font-black text-3xl tracking-[0.2em] rounded-sm disabled:opacity-30">마법부여</button>
                        <button id="btn-sell" class="flex-1 py-6 bg-[#1a1a24] hover:bg-[#252533] text-gray-400 font-bold text-sm transition-all border border-gray-700 active:translate-y-1">판매 <span id="sell-price-display" class="block text-yellow-700 font-mono text-xs">50 G</span></button>
                    </div>
                </div>
                <!-- 로그 출력 -->
                <div id="log-box" class="h-28 bg-black/70 p-5 overflow-y-auto font-mono text-xs no-scrollbar border-t border-gray-900/50">
                    <!-- 로그 항목이 추가됩니다 -->
                </div>
            </footer>
        </div>

        <!-- [4] 구호 요정 모달 -->
        <div id="modal-fairy" class="hidden fixed inset-0 bg-black/95 z-[200] flex items-center justify-center p-4 backdrop-blur-2xl">
            <div class="bg-[#12121a] border border-yellow-800/20 p-10 text-center max-w-sm shadow-[0_0_100px_rgba(217,119,6,0.1)]">
                <div class="text-7xl mb-8 animate-bounce">🧚‍♀️</div>
                <h3 class="font-cinzel text-2xl font-bold mb-4 text-gray-100 tracking-widest">FAIRY'S GRACE</h3>
                <p class="text-gray-500 mb-10 text-sm leading-relaxed">"모든 마력을 소진하셨군요...<br>다시 도전할 수 있도록 기운을 나누어 드릴게요."</p>
                <div class="bg-black p-6 rounded-sm mb-10 border border-yellow-800/10">
                    <span class="text-yellow-600 font-black text-3xl tracking-tighter">+ 5,000 G</span>
                </div>
                <button onclick="Game.receiveRescue()" class="btn-medieval w-full py-5 text-white font-black text-xl tracking-widest rounded-sm bg-gradient-to-b from-yellow-700 to-yellow-900 border-yellow-600 shadow-[0_4px_0_#451a03]">수락하기</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * --- [데이터 정의] ---
         * 강화 레벨에 따른 비용, 확률, 판매가 밸런스 조정
         */
        const LEVEL_DATA = Array.from({ length: 21 }, (_, i) => ({
            level: i,
            cost: Math.floor(100 * Math.pow(1.5, i)) + (i * 200),
            prob: Math.max(100 - (i * 6) - (i > 10 ? (i - 10) * 4 : 0), 1),
            sell: Math.floor(50 * Math.pow(2.1, i)) + (i * 1000)
        }));

        /**
         * --- [사운드 엔진] ---
         * Web Audio API를 사용하여 외부 파일 없이 사운드 생성
         */
        const Sound = {
            ctx: null,
            init() { 
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
            },
            play(type) {
                this.init();
                if (this.ctx.state === 'suspended') this.ctx.resume();
                
                const g = this.ctx.createGain();
                const o = this.ctx.createOscillator();
                g.connect(this.ctx.destination);
                o.connect(g);
                const now = this.ctx.currentTime;

                switch(type) {
                    case 'click':
                        o.type = 'sine';
                        o.frequency.setValueAtTime(800, now);
                        o.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                        g.gain.setValueAtTime(0.1, now);
                        g.gain.linearRampToValueAtTime(0, now + 0.1);
                        o.start(now); o.stop(now + 0.1);
                        break;
                    case 'enhance_start':
                        o.type = 'sawtooth';
                        o.frequency.setValueAtTime(100, now);
                        o.frequency.linearRampToValueAtTime(300, now + 0.6);
                        g.gain.setValueAtTime(0, now);
                        g.gain.linearRampToValueAtTime(0.1, now + 0.1);
                        g.gain.linearRampToValueAtTime(0, now + 0.6);
                        o.start(now); o.stop(now + 0.6);
                        break;
                    case 'success':
                        [523.25, 659.25, 783.99].forEach((freq, i) => {
                            const osc = this.ctx.createOscillator();
                            const gn = this.ctx.createGain();
                            osc.connect(gn); gn.connect(this.ctx.destination);
                            osc.frequency.setValueAtTime(freq, now + i * 0.1);
                            gn.gain.setValueAtTime(0.1, now + i * 0.1);
                            gn.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.4);
                            osc.start(now + i * 0.1); osc.stop(now + i * 0.1 + 0.4);
                        });
                        break;
                    case 'fail':
                        o.type = 'sawtooth';
                        o.frequency.setValueAtTime(150, now);
                        o.frequency.linearRampToValueAtTime(20, now + 0.6);
                        g.gain.setValueAtTime(0.1, now);
                        g.gain.linearRampToValueAtTime(0, now + 0.6);
                        o.start(now); o.stop(now + 0.6);
                        break;
                    case 'sell':
                        o.type = 'triangle';
                        o.frequency.setValueAtTime(600, now);
                        o.frequency.exponentialRampToValueAtTime(1200, now + 0.2);
                        g.gain.setValueAtTime(0.1, now);
                        g.gain.linearRampToValueAtTime(0, now + 0.2);
                        o.start(now); o.stop(now + 0.2);
                        break;
                }
            }
        };

        /**
         * --- [메인 게임 컨트롤러] ---
         */
        const Game = {
            gold: 10000,
            level: 0,
            isWorking: false,

            start() {
                Sound.play('click');
                const loading = document.getElementById('screen-loading');
                loading.style.opacity = '0';
                setTimeout(() => {
                    loading.classList.add('hidden');
                    this.changeScreen('playing');
                }, 1000);
            },

            changeScreen(name) {
                document.querySelectorAll('[id^="screen-"]').forEach(s => s.classList.add('hidden'));
                document.getElementById(`screen-${name}`).classList.remove('hidden');
                if (name === 'playing') this.updateUI();
            },

            updateUI() {
                const data = LEVEL_DATA[this.level];
                document.getElementById('gold-display').innerText = `${this.gold.toLocaleString()} G`;
                document.getElementById('level-display').innerText = `+${this.level}`;
                
                const nameDisplay = document.getElementById('name-display');
                const swordImg = document.getElementById('sword-image');
                
                if (this.level === 0) {
                    nameDisplay.innerText = "기본검";
                    swordImg.src = "image/기본검.png";
                } else {
                    nameDisplay.innerText = "화염검";
                    const imgNum = Math.min(this.level, 10);
                    // png 확장자로 수정
                    swordImg.src = `image/화염검 _ ${imgNum}.png`;
                }

                swordImg.onerror = () => {
                    this.log(`[시스템] 이미지 로드 실패: ${swordImg.src}`, 'text-red-900');
                    swordImg.src = "https://via.placeholder.com/400x400/0a0a0f/e2e8f0?text=Asset+Missing";
                };

                document.getElementById('prob-display').innerText = this.level < 20 ? `${data.prob}%` : "MAX";
                document.getElementById('cost-display').innerText = this.level < 20 ? `${data.cost.toLocaleString()} G` : "-";
                document.getElementById('sell-price-display').innerText = `${data.sell.toLocaleString()} G`;

                document.getElementById('sword-canvas').style.transform = `scale(${1 + this.level * 0.015})`;
            },

            log(msg, colorClass = 'text-gray-500') {
                const entry = document.createElement('div');
                entry.className = `log-entry ${colorClass} mb-1 border-l-2 border-current pl-3 py-1 bg-white/5`;
                const now = new Date();
                const timeStr = `${now.getHours()}:${now.getMinutes()}:${now.getSeconds()}`;
                entry.innerHTML = `<span class="opacity-30 text-[9px] mr-2">[${timeStr}]</span>${msg}`;
                const box = document.getElementById('log-box');
                box.prepend(entry);
            },

            triggerFlash(type) {
                const layer = document.getElementById('flash-layer');
                layer.className = `fixed inset-0 z-[100] pointer-events-none effect-${type}`;
                setTimeout(() => layer.className = 'fixed inset-0 z-[100] pointer-events-none', 800);
            },

            triggerBurst(type) {
                const container = document.getElementById('particle-layer');
                container.innerHTML = '';
                const text = document.createElement('div');
                text.className = `float-text font-black text-6xl tracking-tighter ${type === 'success' ? 'text-white' : 'text-red-700'}`;
                text.innerText = type === 'success' ? '각성 성공' : '파괴됨';
                container.appendChild(text);
            },

            enhance() {
                if (this.isWorking || this.level >= 20) return;
                const data = LEVEL_DATA[this.level];
                
                if (this.gold < data.cost) {
                    this.log("재화가 부족하여 의식을 진행할 수 없습니다.", "text-red-400");
                    return;
                }

                this.isWorking = true;
                document.getElementById('btn-enhance').disabled = true;
                this.gold -= data.cost;
                Sound.play('enhance_start');
                this.log(`의식을 진행합니다... (${data.cost.toLocaleString()} G 소모)`, "text-gray-400");
                
                const canvas = document.getElementById('sword-canvas');
                canvas.classList.add('opacity-40', 'blur-sm', 'scale-90');

                setTimeout(() => {
                    const success = (Math.random() * 100) < data.prob;
                    canvas.classList.remove('opacity-40', 'blur-sm', 'scale-90');

                    if (success) {
                        this.level++;
                        Sound.play('success');
                        this.triggerFlash('success');
                        this.triggerBurst('success');
                        this.log(`강화 성공! 무기의 기운이 +${this.level} 레벨로 증폭되었습니다.`, 'text-green-500 font-bold');
                    } else {
                        this.level = 0;
                        Sound.play('fail');
                        this.triggerFlash('fail');
                        this.triggerBurst('fail');
                        this.log(`강화 실패... 무기가 과부하를 견디지 못하고 산산조각 났습니다.`, 'text-red-600 font-bold');
                        document.getElementById('forge-area').classList.add('shake-heavy');
                        setTimeout(() => document.getElementById('forge-area').classList.remove('shake-heavy'), 500);
                    }

                    this.isWorking = false;
                    document.getElementById('btn-enhance').disabled = false;
                    this.updateUI();

                    if (this.gold < 100 && this.level === 0) {
                        setTimeout(() => document.getElementById('modal-fairy').classList.remove('hidden'), 1200);
                    }
                }, 800);
            },

            sell() {
                if (this.isWorking) return;
                const price = LEVEL_DATA[this.level].sell;
                this.gold += price;
                Sound.play('sell');
                this.log(`무기를 상단에 판매하여 ${price.toLocaleString()} G 를 확보했습니다.`, 'text-yellow-600');
                this.level = 0;
                this.updateUI();
            },

            receiveRescue() {
                Sound.play('success');
                this.gold += 5000;
                this.log("요정의 은총으로 재기할 힘을 얻었습니다.", "text-yellow-400 font-bold");
                document.getElementById('modal-fairy').classList.add('hidden');
                this.updateUI();
            }
        };

        document.getElementById('btn-enhance').addEventListener('click', () => Game.enhance());
        document.getElementById('btn-sell').addEventListener('click', () => Game.sell());

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('screen-loading').classList.add('hidden');
                Game.changeScreen('menu');
            }, 2000);
        };
    </script>
</body>
</html>
