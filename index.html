<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>전설의 무기 강화</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0a0a0c; color: #e2e8f0; margin: 0; height: 100vh; overflow: hidden; user-select: none; }
        
        /* 마법진 회전 */
        .magic-circle { animation: spin 40s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 화면 흔들림 (실패 시) */
        .animate-shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); } 20%, 40%, 60%, 80% { transform: translateX(5px); } }

        /* 성공 섬광 효과 */
        .flash-success { animation: flashSuccess 0.6s ease-out forwards; }
        @keyframes flashSuccess { 0% { background-color: rgba(255, 255, 255, 0.8); opacity: 1; } 100% { background-color: transparent; opacity: 0; } }

        /* 실패 섬광 효과 */
        .flash-fail { animation: flashFail 0.6s ease-out forwards; }
        @keyframes flashFail { 0% { background-color: rgba(220, 38, 38, 0.5); opacity: 1; } 100% { background-color: transparent; opacity: 0; } }

        .log-entry { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .game-viewport { height: 100dvh; display: flex; flex-direction: column; }
    </style>
</head>
<body class="bg-black">
    <div class="game-viewport">
        <!-- 1. 로딩 화면 -->
        <div id="screen-loading" class="fixed inset-0 z-[100] bg-[#0a0a0c] flex flex-col items-center justify-center">
            <div class="w-16 h-16 border-4 border-red-900 border-t-red-500 rounded-full animate-spin mb-6"></div>
            <h1 class="text-2xl font-bold text-gray-400">마법부여소 접속 중...</h1>
        </div>

        <!-- 2. 메뉴 화면 -->
        <div id="screen-menu" class="hidden fixed inset-0 z-50 bg-[#0a0a0c] flex flex-col items-center justify-center p-6 text-center">
            <h1 class="text-6xl font-black mb-4 text-transparent bg-clip-text bg-gradient-to-b from-white to-gray-500">무기 강화</h1>
            <button onclick="changeScreen('playing')" class="py-5 px-12 bg-red-800 text-white font-bold text-2xl active:scale-95">시작하기</button>
        </div>

        <!-- 3. 게임 화면 -->
        <div id="screen-playing" class="hidden flex-1 flex flex-col relative overflow-hidden">
            <!-- 전체 화면 섬광 레이어 -->
            <div id="flash-layer" class="fixed inset-0 z-[60] pointer-events-none opacity-0"></div>

            <header class="flex justify-between items-center px-6 py-4 bg-[#12121a] border-b border-gray-800 z-30">
                <div class="flex items-center gap-3"><span class="text-yellow-500 font-bold text-xl">⛃</span><span id="gold-display" class="font-mono text-xl font-bold">10,000 G</span></div>
                <button onclick="changeScreen('menu')" class="text-xs text-gray-500 border border-gray-800 px-3 py-1">나가기</button>
            </header>

            <div id="game-main" class="flex-1 relative flex flex-col items-center justify-center">
                <!-- 마법진 -->
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-10">
                    <svg class="w-[120%] magic-circle" viewBox="0 0 500 500">
                        <circle cx="250" cy="250" r="200" stroke="#f87171" stroke-width="2" fill="none" stroke-dasharray="4 8" />
                        <path d="M 250 50 L 391 391 L 58 208 L 441 208 L 108 391 Z" stroke="#f87171" stroke-width="1" fill="none" />
                    </svg>
                </div>

                <div class="text-center mb-4 z-20">
                    <h2 class="text-4xl md:text-6xl font-black text-gray-100"><span id="level-display" class="text-red-500">+0</span> <span id="name-display">기본검</span></h2>
                </div>

                <!-- 무기 이미지 영역 -->
                <div id="sword-image-container" class="relative w-full max-w-sm aspect-square flex items-center justify-center transition-all duration-500 p-4 z-10">
                    <img id="sword-image" src="" alt="무기" class="max-w-full max-h-full object-contain drop-shadow-[0_0_30px_rgba(255,255,255,0.2)]">
                </div>
            </div>

            <!-- 하단 컨트롤러 -->
            <div class="shrink-0 bg-[#12121a] border-t border-gray-800 p-4 z-30">
                <div class="flex gap-2 mb-4">
                    <div class="flex-1 bg-[#0a0a0c] p-2 rounded border border-gray-800 text-center"><span class="text-[10px] text-gray-500 block">확률</span><span id="prob-display" class="text-green-400 font-bold text-lg">100%</span></div>
                    <div class="flex-1 bg-[#0a0a0c] p-2 rounded border border-gray-800 text-center"><span class="text-[10px] text-gray-500 block">비용</span><span id="cost-display" class="text-yellow-500 font-bold text-lg">100 G</span></div>
                </div>
                <div class="flex gap-3 mb-4">
                    <button id="enhance-btn" class="flex-[2] py-4 bg-red-900 text-white font-black text-2xl active:scale-95 disabled:opacity-50">마법부여</button>
                    <button id="sell-btn" class="flex-1 py-4 bg-[#1a1a24] text-gray-300 font-bold text-sm">판매 <span id="sell-price-display" class="block text-yellow-500">50 G</span></button>
                </div>
                <div id="log-container" class="h-28 bg-black p-3 overflow-y-auto font-mono text-[11px] no-scrollbar border border-gray-900"></div>
            </div>
        </div>
    </div>

    <script>
        const LEVEL_DATA = Array.from({length: 21}, (_, i) => ({
            level: i, cost: i * 500 + 100, prob: Math.max(100 - i * 5, 5), sell: Math.pow(i, 3) * 1000 + 50
        }));

        let state = { gold: 10000, level: 0, isEnhancing: false };

        function changeScreen(name) {
            document.querySelectorAll('[id^="screen-"]').forEach(s => s.classList.add('hidden'));
            document.getElementById(`screen-${name}`).classList.remove('hidden');
            if(name === 'playing') updateUI();
        }

        function updateUI() {
            const d = LEVEL_DATA[state.level];
            document.getElementById('gold-display').innerText = `${state.gold.toLocaleString()} G`;
            document.getElementById('level-display').innerText = `+${state.level}`;
            document.getElementById('name-display').innerText = state.level === 0 ? "기본검" : "화염검";
            document.getElementById('prob-display').innerText = state.level < 20 ? `${d.prob}%` : "MAX";
            document.getElementById('cost-display').innerText = state.level < 20 ? `${d.cost.toLocaleString()} G` : "-";
            document.getElementById('sell-price-display').innerText = `${d.sell.toLocaleString()} G`;
            
            const swordImg = document.getElementById('sword-image');
            // 경로 강조: 반드시 image 폴더 안의 png 파일을 찾습니다.
            const targetPath = state.level === 0 ? `image/기본검.png` : `image/화염검 _ ${Math.min(state.level, 10)}.png`;
            swordImg.src = targetPath;

            swordImg.onerror = () => {
                console.error("이미지 로드 실패:", targetPath);
                addLog(`이미지 못찾음: ${targetPath}`, 'text-red-400');
                swordImg.src = 'https://via.placeholder.com/400?text=Image+Not+Found';
            };
            
            document.getElementById('sword-image-container').style.transform = `scale(${1 + state.level * 0.03})`;
        }

        function addLog(text, colorClass) {
            const e = document.createElement('div');
            e.className = `log-entry ${colorClass}`;
            e.innerText = `▶ ${text}`;
            const container = document.getElementById('log-container');
            container.prepend(e);
        }

        function triggerFlash(type) {
            const flash = document.getElementById('flash-layer');
            flash.classList.remove('flash-success', 'flash-fail');
            void flash.offsetWidth; // 리플로우 강제 발생
            flash.classList.add(type === 'success' ? 'flash-success' : 'flash-fail');
        }

        document.getElementById('enhance-btn').onclick = () => {
            if (state.isEnhancing) return;
            const d = LEVEL_DATA[state.level];
            if (state.gold < d.cost) return addLog('골드 부족!', 'text-red-500');

            state.isEnhancing = true;
            state.gold -= d.cost;
            addLog(`강화 의식 진행 중...`, 'text-gray-500');
            
            const container = document.getElementById('sword-image-container');
            container.classList.add('opacity-50', 'blur-sm', 'scale-90');

            setTimeout(() => {
                const success = Math.random() * 100 < d.prob;
                container.classList.remove('opacity-50', 'blur-sm', 'scale-90');
                
                if (success) {
                    state.level++;
                    addLog(`강화 성공! (+${state.level})`, 'text-green-400');
                    triggerFlash('success');
                } else {
                    state.level = 0;
                    addLog('강화 실패! 파괴되었습니다.', 'text-red-500');
                    triggerFlash('fail');
                    document.getElementById('screen-playing').classList.add('animate-shake');
                    setTimeout(() => document.getElementById('screen-playing').classList.remove('animate-shake'), 400);
                }
                state.isEnhancing = false;
                updateUI();
            }, 700);
        };

        document.getElementById('sell-btn').onclick = () => {
            if (state.isEnhancing) return;
            state.gold += LEVEL_DATA[state.level].sell;
            state.level = 0;
            updateUI();
            addLog('판매 완료!', 'text-yellow-500');
        };

        window.onload = () => setTimeout(() => changeScreen('menu'), 1000);
    </script>
</body>
</html>
